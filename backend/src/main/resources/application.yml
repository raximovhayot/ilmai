spring:
  application:
    name: ilmai-backend

  threads:
    virtual:
      enabled: true

  autoconfigure:
    exclude:
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingConnectionAutoConfiguration
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiTextEmbeddingAutoConfiguration

  docker:
    compose:
      file: ./backend/compose.yaml

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mydatabase}
    username: ${DB_USERNAME:myuser}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  ai:
    vectorstore:
      pgvector:
        initialize-schema: false
        dimensions: 768
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        table-name: vector_store
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    google:
      genai:
        api-key: ${GOOGLE_GENAI_API_KEY:}
        chat:
          options:
            model: ${GOOGLE_GENAI_CHAT_MODEL:gemini-3.1-flash-lite}

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

uimessagestream:
  tool-io:
    native: true

ai:
  retrieval:
    top-k: ${RETRIEVAL_TOP_K:6}
    similarity-threshold: ${RETRIEVAL_SIMILARITY_THRESHOLD:0.0}
  embedding:
    api-key: ${GOOGLE_GENAI_API_KEY:}
    model: ${GOOGLE_GENAI_EMBEDDING_MODEL:gemini-embedding-2}
    output-dimensionality: 768
    base-url: ${GOOGLE_GENAI_EMBEDDING_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
    document-task-type: RETRIEVAL_DOCUMENT
    query-task-type: RETRIEVAL_QUERY
    max-batch-size: 100

auth:
  jwt:
    issuer: ilmai
    secret: ${JWT_SECRET:}
    access-ttl: P1D
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  refresh-token:
    ttl: P7D

storage:
  s3:
    bucket: ${STORAGE_S3_BUCKET:ilmai-materials}
    region: ${STORAGE_S3_REGION:us-east-1}
    endpoint: ${STORAGE_S3_ENDPOINT:http://localhost:3900}
    access-key: ${STORAGE_S3_ACCESS_KEY:GK1ac1bd1ac1bd1ac1bd1ac1bd}
    secret-key: ${STORAGE_S3_SECRET_KEY:1ac1bd1ac1bd1ac1bd1ac1bd1ac1bd1ac1bd1ac1bd1ac1bd1ac1bd1ac1bd1ac1}
    path-style-access: ${STORAGE_S3_PATH_STYLE_ACCESS:true}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: "*"
  exposed-headers: ""
  allow-credentials: true
  max-age: 1h

ingestion:
  pdf:
    pages-per-chunk: ${INGESTION_PDF_PAGES_PER_CHUNK:6}
    page-overlap: ${INGESTION_PDF_PAGE_OVERLAP:2}
  audio:
    window-ms: ${INGESTION_AUDIO_WINDOW_MS:120000}
    overlap-ms: ${INGESTION_AUDIO_OVERLAP_MS:5000}
  retry:
    enabled: true
    max-attempts: 3
    min-failure-age: PT5M
    batch-size: 20
    fixed-delay: PT1M
    initial-delay: PT1M

plan:
  replan:
    behind-threshold-days: ${PLAN_BEHIND_THRESHOLD_DAYS:3}

notifications:
  broken-streak-nudge-hour: ${NOTIFICATIONS_BROKEN_STREAK_NUDGE_HOUR:8}

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  bot-username: ${TELEGRAM_BOT_USERNAME:}
  webhook-secret: ${TELEGRAM_WEBHOOK_SECRET:}
  public-base-url: ${TELEGRAM_PUBLIC_BASE_URL:}

billing:
  free-tier:
    daily-quiz: 3
    daily-chat-messages: 50
    material-uploads: 5

jobrunr:
  background-job-server:
    enabled: ${JOBRUNR_BACKGROUND_JOB_SERVER_ENABLED:false}
  dashboard:
    enabled: false
  database:
    skip-create: false

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:local}
  send-default-pii: false
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0}
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: info

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    org.hibernate.SQL: INFO
    org.flywaydb: INFO
