name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/ilmai-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/ilmai-frontend

jobs:
  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      backend_tag: ${{ steps.meta.outputs.tag }}
      frontend_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image refs and tag
        id: meta
        run: |
          echo "backend=$(echo "$BACKEND_IMAGE" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "frontend=$(echo "$FRONTEND_IMAGE" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend }}:latest
            ${{ steps.meta.outputs.backend }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend }}:latest
            ${{ steps.meta.outputs.frontend }}:${{ steps.meta.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=http://backend:8080
            NEXT_PUBLIC_DEMO_MODE=0
            NEXT_PUBLIC_MOCK_API=0
            NEXT_PUBLIC_LIVE_FEATURES=all
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: actions/checkout@v4

      - name: Copy stack files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.yml,deploy/**"
          target: "~/ilmai"
          overwrite: true

      - name: Pull & restart stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: GHCR_USER,GHCR_TOKEN,BACKEND_REF,FRONTEND_REF
          script: |
            set -euo pipefail
            cd ~/ilmai
            if [ ! -f .env ]; then
              echo "ERROR: ~/ilmai/.env is missing. Create it from .env.example first." >&2
              exit 1
            fi
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            export BACKEND_IMAGE="$BACKEND_REF"
            export FRONTEND_IMAGE="$FRONTEND_REF"
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          BACKEND_REF: ghcr.io/${{ github.repository_owner }}/ilmai-backend:sha-${{ github.sha }}
          FRONTEND_REF: ghcr.io/${{ github.repository_owner }}/ilmai-frontend:sha-${{ github.sha }}
